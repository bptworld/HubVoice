micro_wake_word:
  id: mww
  microphone:
    microphone: i2s_mics
    channels: 0
  stop_after_detection: false
  models:
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
    - model: hey_jarvis
      id: hey_jarvis
    - model: hey_mycroft
      id: hey_mycroft
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  vad:
    probability_cutoff: 0.85
    sliding_window_size: 1
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    else:
                      - media_player.stop:
                          id: external_media_player
                      - if:
                          condition:
                            switch.is_on: wake_sound
                          then:
                            - script.execute:
                                id: play_sound
                                priority: true
                                sound_file: "wake_word_triggered_sound"
                            - wait_until:
                                condition:
                                  lambda: return id(external_media_player).state == media_player::MediaPlayerState::MEDIA_PLAYER_STATE_ANNOUNCING;
                                timeout: 2500ms
                            - delay: 220ms
                      - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
                      - script.execute: control_leds
                      - voice_assistant.start:
                          wake_word: !lambda return wake_word;

select:
  - platform: template
    id: wake_word_choice
    name: "Wake Word"
    optimistic: true
    initial_option: Hey Jarvis
    restore_value: true
    entity_category: config
    options:
      - Hey Jarvis
      - Okay Nabu
    on_value:
      - script.execute: configure_selected_wake_word

  - platform: template
    id: wake_word_sensitivity
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Very sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      - script.execute: configure_selected_wake_word

voice_assistant:
  id: va
  microphone:
    microphone: i2s_mics
    channels: 0
  media_player: external_media_player
  micro_wake_word: mww
  use_wake_word: false
  noise_suppression_level: 2
  auto_gain: 31dBFS
  volume_multiplier: 2.0
  on_client_connected:
    - lambda: id(init_in_progress) = false;
    - lambda: |-
        id(external_media_player)
          ->make_call()
          .set_volume(id(speaker_volume).state / 100.0f)
          .perform();
    - script.execute: configure_selected_wake_word
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - script.execute: configure_selected_wake_word
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_error:
    - lambda: id(follow_up_armed) = false;
    - lambda: id(follow_up_active) = false;
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    - if:
        condition:
          - lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: "error_cloud_expired"
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: ${audio_decibel_reduction}
        duration: 0.0s
    - if:
        condition:
          lambda: return !id(ptt_button_hold_active);
        then:
          - micro_wake_word.enable_model: stop
          - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
          - script.execute: control_leds
          - script.execute: force_stop_wake_word_capture
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
    - script.stop: force_stop_wake_word_capture
    - if:
        condition:
          and:
            - lambda: return !id(ptt_button_hold_active);
            - voice_assistant.is_running:
        then:
          - voice_assistant.stop:
  on_intent_progress:
    - if:
        condition:
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
    - if:
        condition:
          lambda: return id(follow_up_enabled) && !id(follow_up_active);
        then:
          - lambda: id(follow_up_armed) = true;
    - if:
        condition:
          lambda: return id(whisper_mode_active);
        then:
          - lambda: |-
              id(external_media_player)
                ->make_call()
                .set_volume(id(speaker_volume).state * ${whisper_volume_pct} / 10000.0f)
                .perform();
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - script.stop: force_stop_wake_word_capture
    - if:
        condition:
          switch.is_off: timer_ringing
        then:
          - micro_wake_word.disable_model: stop
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition:
          lambda: return id(whisper_mode_active);
        then:
          - lambda: |-
              id(external_media_player)
                ->make_call()
                .set_volume(id(speaker_volume).state / 100.0f)
                .perform();
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
    - if:
        condition:
          lambda: return id(follow_up_enabled) && id(follow_up_armed) && !id(follow_up_active);
        then:
          - script.execute: follow_up_listen
    - lambda: id(follow_up_active) = false;
  on_timer_finished:
    - switch.turn_on: timer_ringing
  on_timer_started:
    - script.execute: control_leds
  on_timer_cancelled:
    - script.execute: control_leds
  on_timer_updated:
    - script.execute: control_leds
  on_timer_tick:
    - script.execute: control_leds

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"

      - if:
          condition:
            lambda: return sound_file == id(jack_connected_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: jack_connected_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(jack_disconnected_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: jack_disconnected_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(timer_finished_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: timer_finished_sound
                announcement: true
                enqueue: false

  - id: fetch_first_active_timer
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          auto output_timer = *timers.begin();
          for (const auto &timer : timers) {
            if (timer.is_active && timer.seconds_left <= output_timer.seconds_left) {
              output_timer = timer;
            }
          }
          id(first_active_timer) = output_timer;

  - id: check_if_timers_active
    then:
      - lambda: |
          const auto &timers = id(va).get_timers();
          bool output = false;
          for (const auto &timer : timers) {
            if (timer.is_active) { output = true; }
          }
          id(is_timer_active) = output;

  - id: activate_stop_word_once
    then:
      # Media player state monitoring disabled - no media player configured
      - delay: 1s
      - if:
          condition:
            switch.is_off: timer_ringing
          then:
            - micro_wake_word.enable_model: stop
            - delay: 5s
            - if:
                condition:
                  switch.is_off: timer_ringing
                then:
                  - micro_wake_word.disable_model: stop



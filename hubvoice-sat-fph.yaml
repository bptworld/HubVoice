# TTS/voice answer path is now locked to media_player transport for all spoken replies.
# Do not revert to VA event TTS_END URL delivery for answers.
# All future changes must preserve this path for reliability.
#
# Next: enable and test music/media streaming via media_player.
#
substitutions:
  # ============================================================================
  # VOICE ASSISTANT PHASE IDENTIFIERS
  # ============================================================================
  voice_assist_idle_phase_id: '1'
  voice_assist_waiting_for_command_phase_id: '2'
  voice_assist_listening_for_command_phase_id: '3'
  voice_assist_thinking_phase_id: '4'
  voice_assist_replying_phase_id: '5'
  voice_assist_not_ready_phase_id: '10'
  voice_assist_error_phase_id: '11'

  # ============================================================================
  # DEVICE IDENTIFICATION & FIRMWARE
  # ============================================================================
  hidden_ssid: "false"
  device_name: "hubvoice-sat-fph"
  friendly_name: "HubVoiceSat FPH"
  firmware_version: "2026.04.03.1"
  xmos_fw_version: "v1.0.3"

  # ============================================================================
  # AUDIO FILES
  # ============================================================================
  jack_connected_sound_file: assets/sounds/jack_connected.flac
  jack_disconnected_sound_file: assets/sounds/jack_disconnected.flac
  mute_switch_on_sound_file: assets/sounds/mute_switch_on.flac
  mute_switch_off_sound_file: assets/sounds/mute_switch_off.flac
  timer_finished_sound_file: assets/sounds/timer_finished.flac
  wake_word_triggered_sound_file: assets/sounds/wake_word_triggered.flac
  action_button_press_sound_file: assets/sounds/center_button_press.flac
  action_button_double_press_sound_file: assets/sounds/center_button_double_press.flac
  action_button_triple_press_sound_file: assets/sounds/center_button_triple_press.flac
  action_button_long_press_sound_file: assets/sounds/center_button_long_press.flac
  factory_reset_initiated_sound_file: assets/sounds/factory_reset_initiated.mp3
  factory_reset_cancelled_sound_file: assets/sounds/factory_reset_cancelled.mp3
  factory_reset_confirmed_sound_file: assets/sounds/factory_reset_confirmed.mp3
  easter_egg_tick_sound_file: assets/sounds/easter_egg_tick.mp3
  easter_egg_tada_sound_file: assets/sounds/easter_egg_tada.mp3
  error_cloud_expired_sound_file: assets/sounds/error_cloud_expired.mp3

  # ============================================================================
  # ADVANCED CONFIGURATION
  # ============================================================================
  esphome_api_port: "6054"
  http_server_port: "8080"
  speaker_volume_min: "10"
  speaker_volume_initial: "65"
  speaker_volume_max: "100"
  wake_volume_min: "10"
  wake_volume_initial: "65"
  wake_volume_max: "100"
  audio_decibel_reduction: "20"
  whisper_volume_pct: "20"
  # ============================================================================
  # SENDSPIN CONFIGURATION (For Multi-Satellite Sync)
  # ============================================================================
  # Sendspin provides P2P audio sync between devices without a central server
  # All satellites automatically discover and sync with each other on the same WiFi

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  name_add_mac_suffix: true
  min_version: 2025.9.2
  project:
    name: bptwo.hubvoice_sat_fph
    version: ${firmware_version}
  on_boot:
    - priority: 375
      then:
        - script.execute: control_leds
        - delay: 1s
        - dac_proxy.activate_speaker:
        - lambda: |-
            // Local media_player is currently disabled.
            (void) id(speaker_volume).state;
        - delay: 200ms
        - logger.log: "on_boot: activating TAS2780 mode 2"
        - lambda: id(tas2780_power_mode) = 2;
        - tas2780.activate:
            mode: 2
        - lambda: id(tas2780_active) = true;
        # Fallback: if XMOS never responds and clears init, do it ourselves after 45s
        - delay: 45s
        - if:
            condition:
              lambda: return id(init_in_progress);
            then:
              - lambda: id(init_in_progress) = false;
              - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
              - script.execute: configure_selected_wake_word
              - micro_wake_word.start:
              - script.execute: control_leds
        - component.update: firmware_version_text

esp32:
  board: esp32-s3-devkitc-1
  variant: ESP32S3
  flash_size: 16MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP32_S3_BOX_BOARD: "y"
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: "y"
      CONFIG_SPIRAM_IGNORE_NOTFOUND: "n"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"
      CONFIG_SPIRAM_ALLOW_STACK_EXTERNAL_MEMORY: "y"
      CONFIG_MBEDTLS_EXTERNAL_MEM_ALLOC: "y"
      CONFIG_MBEDTLS_SSL_PROTO_TLS1_3: "y"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      # LWIP tuning for low-latency audio streaming
      CONFIG_LWIP_TCP_MSS: "1200"
      CONFIG_LWIP_TCP_WND_DEFAULT: "19200"
      CONFIG_LWIP_WND_SCALE: "y"
      CONFIG_LWIP_TCP_RCV_SCALE: "1"
      CONFIG_LWIP_TCPIP_RECVMBOX_SIZE: "64"
      CONFIG_LWIP_TCP_RECVMBOX_SIZE: "32"
      CONFIG_LWIP_TCP_SACK_OUT: "y"
      CONFIG_LWIP_TCP_TIMESTAMPS: "y"
      CONFIG_LWIP_TCP_QUEUE_OOSEQ: "y"
      CONFIG_LWIP_TCP_OOSEQ_MAX_PBUFS: "4"
      CONFIG_TCP_OVERSIZE_MSS: "y"
      # WiFi tuning
      CONFIG_ESP_WIFI_AMPDU_RX_ENABLED: "y"
      CONFIG_ESP_WIFI_RX_BA_WIN: "20"
      CONFIG_ESP_WIFI_STATIC_RX_BUFFER_NUM: "10"
      CONFIG_ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: "128"
      ESP_WIFI_AMSDU_TX_ENABLED: "n"
      CONFIG_ESP_WIFI_AMPDU_TX_ENABLED: "y"
      CONFIG_ESP_WIFI_TX_BA_WIN: "10"
      CONFIG_ESP_WIFI_STATIC_TX_BUFFER_NUM: "8"
      CONFIG_ESP_WIFI_CACHE_TX_BUFFER_NUM: "32"

psram:
  mode: octal
  speed: 80MHz

wifi:
  id: wifi_id
  power_save_mode: none
  ap:
    ssid: "HV FPH 192.168.4.1"
    manual_ip:
      static_ip: 192.168.4.1
      gateway: 192.168.4.1
      subnet: 255.255.255.0
  on_connect:
    - lambda: id(improv_ble_in_progress) = false;
    - delay: 5s
    - ble.disable:
    - if:
        condition:
          lambda: return id(init_in_progress);
        then:
          - lambda: id(init_in_progress) = false;
          - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: configure_selected_wake_word
    - micro_wake_word.start:
    - script.execute: control_leds
  on_disconnect:
    - ble.enable:
    - micro_wake_word.stop:
    - script.execute: control_leds

network:
  enable_ipv6: true

logger:
  level: DEBUG
  logs:
    component: DEBUG
    binary_sensor: DEBUG
    micro_wake_word: ERROR
    sensor: WARN
    snapcast_client: WARN
    wifi: WARN
    mdns: WARN
    api: WARN
    ota: WARN
    esp-idf: WARN

# No encryption - hubvoice-runtime.py connects without a HA-managed key
api:
  id: api_id
  port: ${esphome_api_port}
  on_client_connected:
    - script.execute: control_leds
  on_client_disconnected:
    - script.execute: control_leds

ota:
  - platform: esphome
    id: ota_esphome
    on_begin:
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
      - micro_wake_word.stop:
    on_error:
      - script.execute: configure_selected_wake_word
      - micro_wake_word.start:
      - script.execute: control_leds
    on_abort:
      - script.execute: configure_selected_wake_word
      - micro_wake_word.start:
      - script.execute: control_leds

web_server:
  port: ${http_server_port}
  local: true
  js_include: web-ui-custom.js

captive_portal:

esp32_improv:
  authorizer: none

improv_serial:

# FutureProofHomes custom components - required for XMOS, DACs, duplex I2S, etc.
external_components:
  - source:
      type: git
      url: https://github.com/FutureProofHomes/Satellite1-ESPHome
      ref: staging
    components:
      - audio
      - fusb302b
      - i2s_audio
      - memory_flasher
      - micro_wake_word
      - mixer
      - pcm5122
      - resampler
      - satellite1
      - snapcast
      - speaker
      - tas2780
    refresh: 0s
  - source:
      type: git
      url: https://github.com/esphome/esphome
      ref: d48058e140c98f5c2d902661d851a6b712d62434
    components: [media_player]

i2s_audio:
  - id: i2s_shared
    i2s_lrclk_pin: GPIO7
    i2s_bclk_pin: GPIO8
    i2s_mclk_pin: GPIO16
    access_mode: duplex
    i2s_mode: secondary
    use_legacy: false

spi:
  - id: spi_0
    clk_pin: GPIO12
    mosi_pin: GPIO11
    miso_pin: GPIO13

i2c:
  - id: i2c_0
    sda: GPIO5
    scl: GPIO6
    frequency: 400kHz
    scan: true

# ============================================================================
# XMOS AUDIO PROCESSOR
# ============================================================================

satellite1:
  id: satellite1_id
  spi_id: spi_0
  cs_pin: GPIO10
  data_rate: 8000000
  spi_mode: MODE3
  xmos_rst_pin: GPIO4
  on_xmos_no_response:
    then:
      - text_sensor.template.publish:
          id: xmos_firmware_version_text
          state: !lambda 'return id(satellite1_id).status_string();'
      # Auto-flash XMOS if it's not responding and we have an image
      - if:
          condition:
            and:
              - lambda: return id(init_in_progress);
              - lambda: return id(xflash).has_image_embedded();
          then:
            - memory_flasher.write_embedded_image:
  on_xmos_connected:
    then:
      - text_sensor.template.publish:
          id: xmos_firmware_version_text
          state: !lambda 'return id(satellite1_id).status_string();'
      - delay: 1s
      - script.execute: control_leds
      # Flash XMOS if version mismatch
      - if:
          condition:
            and:
              - lambda: return id(init_in_progress);
              - lambda: return id(xflash).has_image_embedded();
              - lambda: return !id(xflash).match_embedded(id(satellite1_id).xmos_fw_version);
          then:
            - memory_flasher.write_embedded_image:
      # Clear init if no flash needed
      - if:
          condition:
            lambda: return id(init_in_progress);
          then:
            - lambda: id(init_in_progress) = false;
            - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
            - script.execute: configure_selected_wake_word
            - micro_wake_word.start:
            - script.execute: control_leds

# Embeds the XMOS firmware binary into flash; flashes it on boot if version mismatches
memory_flasher:
  - platform: satellite1
    id: xflash
    embed_flash_image:
      image_version: ${xmos_fw_version}
      image_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.bin
      md5_file: https://raw.githubusercontent.com/FutureProofHomes/Documentation/refs/heads/main/assets/firmware/xmos/${xmos_fw_version}/satellite1_firmware_fixed_delay.factory.md5
    on_flashing_start:
      then:
        - lambda: id(xmos_flashing_state) = 1;
        - script.execute: control_leds
    on_progress_update:
      then:
        - lambda: id(global_led_animation_index) = id(xflash).flashing_progress * 24 / 100;
        - script.execute: control_leds
    on_flashing_success:
      then:
        - lambda: id(xmos_flashing_state) = 2;
        - script.execute: control_leds
        - lambda: id(xmos_flashing_state) = 0;
        - if:
            condition:
              lambda: return id(pd_fusb302b).contract_voltage >= 9;
            then:
              - lambda: id(tas2780_power_mode) = 2;
              - tas2780.activate:
                  mode: 2
            else:
              - lambda: id(tas2780_power_mode) = 0;
              - tas2780.activate:
                  mode: 0
        - lambda: id(tas2780_active) = true;
    on_flashing_failed:
      then:
        - lambda: id(xmos_flashing_state) = 3;
        - script.execute: control_leds
        - lambda: id(xmos_flashing_state) = 0;
    on_erasing_done:
      then:
        - if:
            condition:
              lambda: return id(factory_reset_requested);
            then:
              - button.press: factory_reset_button

# ============================================================================
# AUDIO DACs
# ============================================================================

audio_dac:
  # PCM5122 - line-out (3.5mm jack)
  - platform: pcm5122
    id: line_out_dac
    i2c_id: i2c_0
    address: 0x4D
  # TAS2780 - internal speaker amplifier
  - platform: tas2780
    id: speaker_dac
    i2c_id: i2c_0
    address: 0x3F
  # satellite1 DAC proxy - routes between speaker and line-out, syncs volume
  - platform: satellite1
    id: dac_proxy
    speaker_dac: speaker_dac
    line_out_dac: line_out_dac
    on_line_out_activated:
      - lambda: |-
          if (!id(line_out_sensor).state) {
            id(dac_proxy).activate_speaker();
          }
    on_state_change:
      - script.execute: control_leds

# USB-C Power Delivery controller - activates TAS2780 boost mode at >=9V
fusb302b:
  id: pd_fusb302b
  irq_pin: GPIO1
  request_voltage: 20
  on_power_ready:
    then:
      - text_sensor.template.publish:
          id: pd_state_text
          state: !lambda 'return id(pd_fusb302b).contract;'
      - if:
          condition:
            lambda: return id(pd_fusb302b).contract_voltage >= 9;
          then:
            - lambda: id(tas2780_power_mode) = 2;
            - tas2780.activate:
                mode: 2
          else:
            - lambda: id(tas2780_power_mode) = 0;
            - tas2780.activate:
                mode: 0
      - lambda: id(tas2780_active) = true;

# ============================================================================
# MICROPHONE
# ============================================================================

# XMOS-backed microphone array (48kHz stereo from XMOS, downmixed per component)
microphone:
  - platform: satellite1
    id: sat1_mics
    i2s_audio_id: i2s_shared
    i2s_din_pin: GPIO15
    sample_rate: 48000
    bits_per_sample: 32bit
    channel: stereo
    pdm: false
    adc_type: external

# ============================================================================
# SPEAKER PIPELINE
# i2s_audio --- mixer --- (announcement resampler, media resampler)
# ============================================================================

speaker:
  - platform: i2s_audio
    id: i2s_audio_speaker
    sample_rate: 48000
    i2s_dout_pin: GPIO9
    bits_per_sample: 32bit
    i2s_audio_id: i2s_shared
    dac_type: external
    channel: stereo
    timeout: never
    buffer_duration: 100ms
    audio_dac: dac_proxy

  - platform: mixer
    id: mixing_speaker
    output_speaker: i2s_audio_speaker
    num_channels: 2
    task_stack_in_psram: true
    source_speakers:
      - id: announcement_mixing_input
        timeout: never
        buffer_duration: 500ms
      - id: media_mixing_input
        timeout: never
        buffer_duration: 100ms

  - platform: resampler
    id: announcement_resampling_speaker
    output_speaker: announcement_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

  - platform: resampler
    id: media_resampling_speaker
    output_speaker: media_mixing_input
    sample_rate: 48000
    bits_per_sample: 16

http_request:
  buffer_size_rx: 2048

safe_mode:

media_player:
  - platform: speaker
    id: external_media_player
    name: Media Player
    announcement_pipeline:
      speaker: announcement_resampling_speaker
      format: FLAC
      num_channels: 1
      sample_rate: 48000
    media_pipeline:
      speaker: media_resampling_speaker
      format: FLAC
      num_channels: 2
      sample_rate: 48000
    volume_increment: 0.05
    volume_min: 0.1
    volume_max: 1.0
    on_announcement:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: ${audio_decibel_reduction}
          duration: 0.0s
    on_state:
      - if:
          condition:
            or:
              - media_player.is_playing: external_media_player
              - media_player.is_announcing: external_media_player
          then:
            - script.execute: tas2780_ensure_active
      - if:
          condition:
            and:
              - switch.is_off: timer_ringing
              - not:
                  voice_assistant.is_running:
              - not:
                  media_player.is_announcing: external_media_player
          then:
            - mixer_speaker.apply_ducking:
                id: media_mixing_input
                decibel_reduction: 0
                duration: 1.0s
    files:
      - id: action_button_press_sound
        file: ${action_button_press_sound_file}
      - id: action_button_double_press_sound
        file: ${action_button_double_press_sound_file}
      - id: action_button_triple_press_sound
        file: ${action_button_triple_press_sound_file}
      - id: action_button_long_press_sound
        file: ${action_button_long_press_sound_file}
      - id: factory_reset_initiated_sound
        file: ${factory_reset_initiated_sound_file}
      - id: factory_reset_cancelled_sound
        file: ${factory_reset_cancelled_sound_file}
      - id: factory_reset_confirmed_sound
        file: ${factory_reset_confirmed_sound_file}
      - id: jack_connected_sound
        file: ${jack_connected_sound_file}
      - id: jack_disconnected_sound
        file: ${jack_disconnected_sound_file}
      - id: mute_switch_on_sound
        file: ${mute_switch_on_sound_file}
      - id: mute_switch_off_sound
        file: ${mute_switch_off_sound_file}
      - id: timer_finished_sound
        file: ${timer_finished_sound_file}
      - id: wake_word_triggered_sound
        file: ${wake_word_triggered_sound_file}
      - id: easter_egg_tick_sound
        file: ${easter_egg_tick_sound_file}
      - id: easter_egg_tada_sound
        file: ${easter_egg_tada_sound_file}
      - id: error_cloud_expired_sound
        file: ${error_cloud_expired_sound_file}

# ============================================================================
# WAKE WORD + VOICE ASSISTANT
# ============================================================================

micro_wake_word:
  id: mww
  microphone:
    microphone: sat1_mics
    channels: 1
    gain_factor: 6
  stop_after_detection: false
  models:
    - model: https://github.com/kahrendt/microWakeWord/releases/download/okay_nabu_20241226.3/okay_nabu.json
      id: okay_nabu
    - model: https://github.com/kahrendt/microWakeWord/releases/download/stop/stop.json
      id: stop
      internal: true
  vad:
    probability_cutoff: 0.85
    sliding_window_size: 1
  on_wake_word_detected:
    - if:
        condition:
          switch.is_off: master_mute_switch
        then:
          - if:
              condition:
                switch.is_on: timer_ringing
              then:
                - switch.turn_off: timer_ringing
              else:
                - if:
                    condition:
                      voice_assistant.is_running:
                    then:
                      voice_assistant.stop:
                    else:
                      - media_player.stop:
                          id: external_media_player
                      - if:
                          condition:
                            switch.is_on: wake_sound
                          then:
                            - script.execute:
                                id: play_sound
                                priority: true
                                sound_file: !lambda return id(wake_word_triggered_sound);
                            - delay: 300ms
                      - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
                      - script.execute: control_leds
                      - voice_assistant.start:
                          wake_word: !lambda return wake_word;

voice_assistant:
  id: va
  microphone:
    microphone: sat1_mics
    channels: 0
  speaker: announcement_resampling_speaker
  micro_wake_word: mww
  use_wake_word: false
  # XMOS handles hardware noise suppression; no software level needed
  noise_suppression_level: 0
  auto_gain: 0 dbfs
  volume_multiplier: 1
  on_client_connected:
    - wait_until:
      not: ble.enabled
    - wait_until:
      not: memory_flasher.in_progress
    - delay: 2s
    - lambda: id(init_in_progress) = false;
    - lambda: |-
        // Local media_player is currently disabled.
        (void) id(speaker_volume).state;
    - script.execute: configure_selected_wake_word
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_client_disconnected:
    - voice_assistant.stop:
    - script.execute: configure_selected_wake_word
    - micro_wake_word.start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
  on_error:
    - lambda: id(follow_up_armed) = false;
    - lambda: id(follow_up_active) = false;
    - if:
        condition:
          and:
            - lambda: return !id(init_in_progress);
            - lambda: return code != "duplicate_wake_up_detected";
            - lambda: return code != "stt-no-text-recognized";
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_error_phase_id};
          - script.execute: control_leds
    - if:
        condition:
          lambda: return code == "cloud-auth-failed";
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(error_cloud_expired_sound);
  on_start:
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: ${audio_decibel_reduction}
        duration: 0.0s
    - if:
        condition:
          lambda: return !id(ptt_button_hold_active);
        then:
          - micro_wake_word.enable_model: stop
          - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
          - script.execute: control_leds
          - script.execute: force_stop_wake_word_capture
  on_listening:
    - lambda: id(voice_assistant_phase) = ${voice_assist_waiting_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_start:
    - lambda: id(voice_assistant_phase) = ${voice_assist_listening_for_command_phase_id};
    - script.execute: control_leds
  on_stt_vad_end:
    - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
    - script.execute: control_leds
    - script.stop: force_stop_wake_word_capture
    - if:
        condition:
          and:
            - lambda: return !id(ptt_button_hold_active);
            - voice_assistant.is_running:
        then:
          - voice_assistant.stop:
  on_intent_progress:
    - if:
        condition:
          lambda: 'return !x.empty();'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
  on_tts_start:
    - if:
        condition:
          lambda: 'return id(voice_assistant_phase) != ${voice_assist_replying_phase_id};'
        then:
          - lambda: id(voice_assistant_phase) = ${voice_assist_replying_phase_id};
          - script.execute: control_leds
          - script.execute: activate_stop_word_once
    - if:
        condition:
          lambda: return id(follow_up_enabled) && !id(follow_up_active);
        then:
          - lambda: id(follow_up_armed) = true;
    - if:
        condition:
          lambda: return id(whisper_mode_active);
        then:
          - lambda: |-
              // Local media_player is currently disabled.
              (void) id(speaker_volume).state;
  on_end:
    - wait_until:
        not:
          voice_assistant.is_running:
    - script.stop: force_stop_wake_word_capture
    - if:
        condition:
          switch.is_off: timer_ringing
        then:
          - micro_wake_word.disable_model: stop
    - mixer_speaker.apply_ducking:
        id: media_mixing_input
        decibel_reduction: 0
        duration: 1.0s
    - if:
        condition:
          lambda: return id(whisper_mode_active);
        then:
          - lambda: |-
              // Local media_player is currently disabled.
              (void) id(speaker_volume).state;
    - if:
        condition:
          lambda: return id(voice_assistant_phase) == ${voice_assist_error_phase_id};
        then:
          - delay: 1s
    - lambda: id(voice_assistant_phase) = ${voice_assist_idle_phase_id};
    - script.execute: control_leds
    - if:
        condition:
          lambda: return id(follow_up_enabled) && id(follow_up_armed) && !id(follow_up_active);
        then:
          - script.execute: follow_up_listen
    - lambda: id(follow_up_active) = false;
  on_timer_finished:
    - switch.turn_on: timer_ringing
  on_timer_started:
    - script.execute: control_leds
  on_timer_cancelled:
    - script.execute: control_leds
  on_timer_updated:
    - script.execute: control_leds
  on_timer_tick:
    - script.execute: control_leds

# ============================================================================
# LED RING --- 24x WS2812 on GPIO21
# ============================================================================

light:
  - platform: esp32_rmt_led_strip
    id: hw_led_ring
    pin: GPIO21
    num_leds: 24
    rgb_order: GRB
    chipset: WS2812
    max_refresh_rate: 15ms
    default_transition_length: 0ms

  # Voice assistant LED ring --- full 24 LEDs, internal (device-controlled)
  - platform: partition
    id: voice_assistant_leds
    internal: true
    default_transition_length: 0ms
    segments:
      - id: hw_led_ring
        from: 0
        to: 23
    effects:
      - addressable_lambda:
          name: "Waiting for Command"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "Listening For Command"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 23) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 22) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 11) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 10) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
            id(global_led_animation_index) = (id(global_led_animation_index) + 1) % 24;
      - addressable_lambda:
          name: "Thinking"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) {
              brightness_step = 0;
              brightness_decreasing = true;
            }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (brightness_decreasing) { brightness_step++; } else { brightness_step--; }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Replying"
          update_interval: 50ms
          lambda: |-
            id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              if (i == id(global_led_animation_index) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 1) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 2) % 24) {
                it[i] = color * 128;
              } else if (i == (id(global_led_animation_index) + 12) % 24) {
                it[i] = color;
              } else if (i == (id(global_led_animation_index) + 13) % 24) {
                it[i] = color * 192;
              } else if (i == (id(global_led_animation_index) + 14) % 24) {
                it[i] = color * 128;
              } else {
                it[i] = Color::BLACK;
              }
            }
      - addressable_lambda:
          name: "Muted or Silent"
          update_interval: 16ms
          lambda: |-
            Color muted_color(255, 0, 0);
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              it[i] = light_color.get_state() ? color : Color::BLACK;
            }
            if (id(master_mute_switch).state) {
              it[5]  = Color::BLACK;
              it[6]  = muted_color;
              it[7]  = Color::BLACK;
              it[17] = Color::BLACK;
              it[18] = muted_color;
              it[19] = Color::BLACK;
            }
            if (id(dac_proxy).volume() == 0.0f || id(dac_proxy).is_muted()) {
              it[11] = Color::BLACK;
              it[12] = muted_color;
              it[13] = Color::BLACK;
            }
      - addressable_lambda:
          name: "Volume Display"
          update_interval: 50ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color silenced_color(255, 0, 0);
            auto volume_ratio = 24.0f * id(dac_proxy).volume();
            for (int i = 0; i < 24; i++) {
              if (i <= volume_ratio) {
                it[(12+i)%24] = color * min(255.0f * (volume_ratio - i), 255.0f);
              } else {
                it[(12+i)%24] = Color::BLACK;
              }
            }
            if (id(dac_proxy).volume() == 0.0f) {
              it[12] = silenced_color;
            }
      - addressable_lambda:
          name: "Action Button Held"
          update_interval: 16ms
          lambda: |-
            if (initial_run) {
              auto led_ring_cv = id(led_ring).current_values;
              auto va_leds_call = id(voice_assistant_leds).make_call();
              va_leds_call.from_light_color_values(led_ring_cv);
              va_leds_call.set_brightness(min(max(id(led_ring).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f));
              va_leds_call.set_state(true);
              va_leds_call.perform();
            }
            auto light_color = id(voice_assistant_leds).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            for (int i = 0; i < 24; i++) {
              it[i] = color;
            }
      - addressable_twinkle:
          name: "Twinkle"
          twinkle_probability: 50%
      - addressable_lambda:
          name: "Error"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) { brightness_step = 0; brightness_decreasing = true; }
            Color error_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = error_color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (brightness_decreasing) { brightness_step++; } else { brightness_step--; }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Ring"
          update_interval: 10ms
          lambda: |-
            static uint8_t brightness_step = 0;
            static bool brightness_decreasing = true;
            static uint8_t brightness_step_number = 10;
            if (initial_run) { brightness_step = 0; brightness_decreasing = true; }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            for (int i = 0; i < 24; i++) {
              it[i] = color * uint8_t(255/brightness_step_number*(brightness_step_number-brightness_step));
            }
            if (id(master_mute_switch).state) {
              it[6]  = muted_color;
              it[18] = muted_color;
            }
            if (brightness_decreasing) { brightness_step++; } else { brightness_step--; }
            if (brightness_step == 0 || brightness_step == brightness_step_number) {
              brightness_decreasing = !brightness_decreasing;
            }
      - addressable_lambda:
          name: "Timer Tick"
          update_interval: 100ms
          lambda: |-
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            Color muted_color(255, 0, 0);
            auto timer_ratio = 24.0f * id(first_active_timer).seconds_left / max(id(first_active_timer).total_seconds, static_cast<uint32_t>(1));
            uint8_t last_led_on = static_cast<uint8_t>(ceil(timer_ratio)) - 1;
            for (int i = 0; i < 24; i++) {
              float brightness_dip = (i == id(global_led_animation_index) % 24 && i != last_led_on) ? 0.9f : 1.0f;
              if (i <= timer_ratio) {
                it[i] = color * min(255.0f * brightness_dip * (timer_ratio - i), 255.0f * brightness_dip);
              } else {
                it[i] = Color::BLACK;
              }
            }
            if (id(master_mute_switch).state) {
              it[5]  = Color::BLACK; it[6]  = muted_color; it[7]  = Color::BLACK;
              it[17] = Color::BLACK; it[18] = muted_color; it[19] = Color::BLACK;
            }
            id(global_led_animation_index) = (24 + id(global_led_animation_index) - 1) % 24;
      - addressable_rainbow:
          name: "Rainbow"
          width: 24
      - addressable_lambda:
          name: "Tick"
          update_interval: 333ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) { index = 0; }
            for (int i = 0; i < 24; i++) {
              it[i] = (i <= index) ? Color::BLACK : color;
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "Factory Reset Coming Up"
          update_interval: 500ms
          lambda: |-
            static uint8_t index = 0;
            Color color(255, 0, 0);
            if (initial_run) { index = 0; }
            for (int i = 0; i < 24; i++) {
              it[i] = (i <= index) ? color : Color::BLACK;
            }
            index = (index + 1) % 24;
      - addressable_lambda:
          name: "XMOS Flashing"
          update_interval: 100ms
          lambda: |-
            int num_lit = id(global_led_animation_index);
            Color flash_color(0, 80, 255);
            for (int i = 0; i < 24; i++) {
              it[i] = (i < num_lit) ? flash_color : Color::BLACK;
            }
      - addressable_lambda:
          name: "Jack Plugged"
          update_interval: 40ms
          lambda: |-
            static uint8_t index = 0;
            if (initial_run) { index = 0; }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            if (index <= 12) {
              for (int i = 0; i < 24; i++) {
                it[i] = (i == index || i == (24 - index) % 24) ? color : Color::BLACK;
              }
            }
            index = (index + 1);
      - addressable_lambda:
          name: "Jack Unplugged"
          update_interval: 40ms
          lambda: |-
            static uint8_t index = 0;
            if (initial_run) { index = 0; }
            auto light_color = id(led_ring).current_values;
            Color color(light_color.get_red() * 255, light_color.get_green() * 255,
                  light_color.get_blue() * 255);
            if (index <= 12) {
              for (int i = 0; i < 24; i++) {
                it[i] = (i == 12 - index || i == (12 + index) % 24) ? color : Color::BLACK;
              }
            }
            index = (index + 1);

  # User-facing LED ring --- exposed for ambient lighting control
  - platform: partition
    id: led_ring
    name: LED Ring
    entity_category: config
    icon: "mdi:dots-circle"
    default_transition_length: 0ms
    restore_mode: RESTORE_DEFAULT_OFF
    initial_state:
      color_mode: rgb
      brightness: 66%
      red: 9.4%
      green: 73.3%
      blue: 94.9%
    segments:
      - id: hw_led_ring
        from: 0
        to: 23

# ============================================================================
# BINARY SENSORS --- buttons + jack detect
# ============================================================================

binary_sensor:
  # Action button (GPIO0) --- PTT voice, double/triple/long press events, factory reset
  - platform: gpio
    id: action_button
    pin:
      number: GPIO0
      inverted: true
      mode:
        input: true
        pullup: true
      ignore_strapping_warning: true
    name: "Button Right (Action)"
    icon: "mdi:gesture-tap"
    on_press:
      - if:
          condition:
            lambda: return !id(init_in_progress);
          then:
            - lambda: id(ptt_button_hold_active) = true;
            - if:
                condition:
                  switch.is_on: timer_ringing
                then:
                  - switch.turn_off: timer_ringing
                else:
                  - if:
                      condition:
                        and:
                          - switch.is_off: master_mute_switch
                          - not: voice_assistant.is_running
                      then:
                        - script.execute:
                            id: play_sound
                            priority: true
                            sound_file: !lambda return id(action_button_press_sound);
                        - delay: 300ms
                        - voice_assistant.start:
                            silence_detection: false
      - script.execute: control_leds
    on_release:
      - lambda: id(ptt_button_hold_active) = false;
      - if:
          condition:
            voice_assistant.is_running:
          then:
            - voice_assistant.stop:
      - script.execute: control_leds
      - if:
          condition:
            lambda: return id(factory_reset_requested);
          then:
            - button.press: factory_reset_button
    on_multi_click:
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: !lambda return id(action_button_double_press_sound);
                - event.trigger:
                    id: button_press_event
                    event_type: "double_press"
      - timing:
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at most 0.25s
          - ON for at most 1s
          - OFF for at least 0.25s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: !lambda return id(action_button_triple_press_sound);
                - event.trigger:
                    id: button_press_event
                    event_type: "triple_press"
      - timing:
          - ON for at least 1s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress) && !id(ptt_button_hold_active);
              then:
                - script.execute:
                    id: play_sound
                    priority: false
                    sound_file: !lambda return id(action_button_long_press_sound);
                - light.turn_off: voice_assistant_leds
                - event.trigger:
                    id: button_press_event
                    event_type: "long_press"
      # Easter egg: H .... A ._
      - timing:
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for at most 0.2s
          - OFF for 0.5s to 2s
          - ON for at most 0.2s
          - OFF for 0s to 2s
          - ON for 0.2s to 2s
        then:
          - if:
              condition:
                lambda: return !id(init_in_progress);
              then:
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Tick"
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: !lambda return id(easter_egg_tick_sound);
                - delay: 4s
                - light.turn_off: voice_assistant_leds
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: !lambda return id(easter_egg_tada_sound);
                - light.turn_on:
                    brightness: 100%
                    id: voice_assistant_leds
                    effect: "Rainbow"
                - event.trigger:
                    id: button_press_event
                    event_type: "easter_egg_press"
      # Factory reset warning at 10s
      - timing:
          - ON for at least 10s
        then:
          - light.turn_on:
              brightness: 100%
              id: voice_assistant_leds
              effect: "Factory Reset Coming Up"
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(factory_reset_initiated_sound);
          - wait_until:
              binary_sensor.is_off: action_button
          - if:
              condition:
                lambda: return !id(factory_reset_requested);
              then:
                - light.turn_off: voice_assistant_leds
                - script.execute:
                    id: play_sound
                    priority: true
                    sound_file: !lambda return id(factory_reset_cancelled_sound);
      # Factory reset confirmed at 22s
      - timing:
          - ON for at least 22s
        then:
          - script.execute:
              id: play_sound
              priority: true
              sound_file: !lambda return id(factory_reset_confirmed_sound);
          - light.turn_on:
              brightness: 100%
              red: 100%
              green: 0%
              blue: 0%
              id: voice_assistant_leds
              effect: "none"
          - lambda: id(factory_reset_requested) = true;

  # Vol+ button --- via satellite1 GPIO expander
  - platform: gpio
    id: btn_vol_up
    pin:
      satellite1:
      port: INPUT_A
      pin: 0
      inverted: true
    name: "Button Up (Vol+)"
    icon: "mdi:volume-plus"
    on_press:
      - lambda: id(volume_buttons_touched) = true;
      - script.execute:
          id: control_volume
          increase_volume: true

  # Vol- button --- via satellite1 GPIO expander
  - platform: gpio
    id: btn_vol_down
    pin:
      satellite1:
      port: INPUT_A
      pin: 2
      inverted: true
    name: "Button Down (Vol-)"
    icon: "mdi:volume-minus"
    on_press:
      - lambda: id(volume_buttons_touched) = true;
      - script.execute:
          id: control_volume
          increase_volume: false

  # Hardware mute switch --- via satellite1 GPIO expander (sliding switch)
  - platform: gpio
    id: hardware_mute_switch
    pin:
      satellite1:
      port: INPUT_A
      pin: 3
      inverted: false
    name: "Button Left (HW Mute)"
    icon: "mdi:microphone-off"
    internal: true
    on_state:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(mute_switch_off_sound);
            - switch.template.publish:
                id: master_mute_switch
                state: OFF
          else:
            - script.execute:
                id: play_sound
                priority: false
                sound_file: !lambda return id(mute_switch_on_sound);
            - switch.template.publish:
                id: master_mute_switch
                state: ON

  # Line-out jack detect --- via PCM5122 GPIO pin 4
  - platform: gpio
    id: line_out_sensor
    pin:
      pcm5122:
      pin: 4
      inverted: false
    name: "line-out jack"
    icon: "mdi:audio-input-stereo-minijack"
    filters:
      - delayed_on: 200ms
      - delayed_off: 200ms
    on_press:
      - dac_proxy.activate_line_out:
      - lambda: id(jack_plugged_recently) = true;
      - script.execute: control_leds
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: !lambda return id(jack_connected_sound);
      - delay: 800ms
      - lambda: id(jack_plugged_recently) = false;
      - script.execute: control_leds
    on_release:
      - dac_proxy.activate_speaker:
      - lambda: id(jack_unplugged_recently) = true;
      - script.execute: control_leds
      - delay: 200ms
      - script.execute:
          id: play_sound
          priority: false
          sound_file: !lambda return id(jack_disconnected_sound);
      - delay: 800ms
      - lambda: id(jack_unplugged_recently) = false;
      - script.execute: control_leds

# ============================================================================
# SENSORS
# ============================================================================

sensor:
  - platform: aht10
    id: aht20_sensor
    address: 0x38
    variant: AHT20
    temperature:
      name: Temperature
      id: temperature_sensor
      filters:
        - lambda: "return x + id(temp_offset_ui).state;"
    humidity:
      name: Humidity
      id: humidity_sensor
      filters:
        - lambda: "return x + id(humidity_offset_ui).state;"
  - platform: ltr_als_ps
    address: 0x29
    type: ALS
    update_interval: 60s
    ambient_light:
      name: "Ambient light"
  - platform: wifi_signal
    name: "Wi-Fi Signal Strength"
    entity_category: diagnostic
    update_interval: 60s

# ============================================================================
# NUMBER ENTITIES
# ============================================================================

number:
  - platform: template
    id: speaker_volume
    name: "Speaker Volume"
    optimistic: true
    restore_value: true
    initial_value: ${speaker_volume_initial}
    min_value: ${speaker_volume_min}
    max_value: ${speaker_volume_max}
    step: 1
    mode: slider
    entity_category: config
    set_action:
      - script.execute: control_leds

  - platform: template
    id: wake_sound_volume
    name: "Wake Sound Volume"
    optimistic: true
    restore_value: true
    initial_value: ${wake_volume_initial}
    min_value: ${wake_volume_min}
    max_value: ${wake_volume_max}
    step: 1
    mode: slider
    entity_category: config

  - platform: template
    id: follow_up_listen_window_seconds
    name: "Follow-up listen window (seconds)"
    optimistic: true
    restore_value: true
    initial_value: 2
    min_value: 1
    max_value: 30
    step: 1
    mode: box
    entity_category: config

  - platform: template
    name: "Offset Temperature"
    id: temp_offset_ui
    device_class: temperature
    min_value: -20
    max_value: 20
    step: 0.1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: "mdi:thermometer"
    entity_category: config
    on_value:
      - lambda: 'id(aht20_sensor).update();'

  - platform: template
    name: "Offset Humidity"
    id: humidity_offset_ui
    unit_of_measurement: "%"
    min_value: -50
    max_value: 50
    step: 0.1
    mode: box
    update_interval: never
    optimistic: true
    restore_value: true
    initial_value: 0
    icon: "mdi:water-percent"
    entity_category: config
    on_value:
      - lambda: 'id(aht20_sensor).update();'

# ============================================================================
# SWITCH ENTITIES
# ============================================================================

switch:
  - platform: template
    id: follow_up_listening_switch
    name: "Follow Up Listening"
    icon: "mdi:account-voice"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    lambda: return id(follow_up_enabled);
    turn_on_action:
      - lambda: id(follow_up_enabled) = true;
      - script.execute: control_leds
    turn_off_action:
      - lambda: id(follow_up_enabled) = false;
      - lambda: id(follow_up_armed) = false;
      - script.execute: control_leds

  - platform: template
    id: whisper_mode
    name: "Whisper Mode"
    icon: "mdi:volume-low"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    on_turn_on:
      - lambda: id(whisper_mode_active) = true;
      - script.execute: control_leds
    on_turn_off:
      - lambda: id(whisper_mode_active) = false;
      - lambda: |-
          // Local media_player is currently disabled.
          (void) id(speaker_volume).state;
      - script.execute: control_leds

  - platform: template
    id: master_mute_switch
    restore_mode: RESTORE_DEFAULT_OFF
    icon: "mdi:microphone-off"
    name: Mute Microphones
    entity_category: config
    turn_on_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - switch.template.publish:
                id: master_mute_switch
                state: ON
    turn_off_action:
      - if:
          condition:
            binary_sensor.is_off: hardware_mute_switch
          then:
            - switch.template.publish:
                id: master_mute_switch
                state: OFF
          else:
            - lambda: id(warning) = true;
            - script.execute: control_leds
    on_turn_on:
      - script.execute: control_leds
    on_turn_off:
      - lambda: id(warning) = false;
      - script.execute: control_leds

  - platform: template
    id: wake_sound
    name: Wake sound
    icon: "mdi:bullhorn"
    entity_category: config
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON

  - platform: template
    id: timer_ringing
    optimistic: true
    internal: true
    restore_mode: ALWAYS_OFF
    on_turn_off:
      - micro_wake_word.disable_model: stop
      - script.stop: ring_timer
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: 0
          duration: 1.0s
      - script.execute: control_leds
    on_turn_on:
      - mixer_speaker.apply_ducking:
          id: media_mixing_input
          decibel_reduction: ${audio_decibel_reduction}
          duration: 0.0s
      - micro_wake_word.enable_model: stop
      - script.execute: ring_timer
      - script.execute: control_leds
      - delay: 15min
      - switch.turn_off: timer_ringing

# ============================================================================
# SELECT ENTITIES
# ============================================================================

select:
  - platform: template
    id: wake_word_choice
    name: "Wake Word"
    optimistic: true
    initial_option: Hey Jarvis
    restore_value: true
    entity_category: config
    options:
      - Hey Jarvis
      - Okay Nabu
    on_value:
      - script.execute: configure_selected_wake_word

  - platform: template
    id: wake_word_sensitivity
    name: "Wake word sensitivity"
    optimistic: true
    initial_option: Moderately sensitive
    restore_value: true
    entity_category: config
    options:
      - Slightly sensitive
      - Moderately sensitive
      - Very sensitive
    on_value:
      - script.execute: configure_selected_wake_word

  - platform: template
    name: Speaker channel output
    id: tas_mode_select
    icon: "mdi:speaker-multiple"
    options:
      - "Mono (Left + Right)"
      - "Left Channel Only"
      - "Right Channel Only"
    initial_option: "Mono (Left + Right)"
    entity_category: config
    optimistic: true
    restore_value: true
    on_value:
      - tas2780.update_config:
          channel: !lambda |-
            auto index = id(tas_mode_select).active_index();
            if (index.has_value()) { return index.value(); }
            return 0;

# ============================================================================
# TEXT / TEXT SENSOR
# ============================================================================

text:
  - platform: template
    id: satellite_name
    name: "Satellite Name"
    optimistic: true
    restore_value: true
    initial_value: ""
    mode: text
    min_length: 0
    max_length: 32
    entity_category: config
    set_action:
      - lambda: id(satellite_name).publish_state(x);
      - component.update: effective_satellite_name
  - platform: template
    id: wifi_setup_ssid
    name: "WiFi Setup SSID"
    optimistic: true
    restore_value: true
    initial_value: ""
    mode: text
    min_length: 0
    max_length: 32
    entity_category: config
    set_action:
      - lambda: id(wifi_setup_ssid).publish_state(x);
  - platform: template
    id: wifi_setup_password
    name: "WiFi Setup Password"
    optimistic: true
    restore_value: true
    initial_value: ""
    mode: password
    min_length: 0
    max_length: 64
    entity_category: config
    set_action:
      - lambda: id(wifi_setup_password).publish_state(x);

text_sensor:
  - platform: template
    id: effective_satellite_name
    name: "Effective Satellite Name"
    internal: true
    entity_category: diagnostic
    lambda: |-
      if (!id(satellite_name).state.empty()) {
        return id(satellite_name).state;
      }
      return App.get_name();
    update_interval: never
  - platform: template
    id: firmware_version_text
    name: "Version"
    entity_category: diagnostic
    lambda: return {"${firmware_version}"};
    update_interval: never
  - platform: template
    id: xmos_firmware_version_text
    name: "XMOS Firmware"
    icon: "mdi:memory"
    entity_category: diagnostic
    update_interval: never
    lambda: return id(satellite1_id).status_string();
  - platform: template
    id: pd_state_text
    name: "USB-C Power Draw"
    icon: "mdi:usb-c-port"
    entity_category: diagnostic
    update_interval: never
    lambda: |-
      if (id(pd_fusb302b).state == power_delivery::PD_STATE_DISCONNECTED) {
        return std::string("Detached");
      } else {
        return id(pd_fusb302b).contract;
      }
  - platform: template
    id: wifi_setup_status
    name: "WiFi Setup Status"
    entity_category: diagnostic
    lambda: |-
      return id(wifi_setup_status_value);
    update_interval: never

# ============================================================================
# EVENTS / BUTTONS
# ============================================================================

event:
  - platform: template
    id: button_press_event
    name: "Button press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - double_press
      - triple_press
      - long_press
      - easter_egg_press
  - platform: template
    id: action_button_press_event
    name: "Action Button Press"
    icon: mdi:button-pointer
    device_class: button
    event_types:
      - single_press
      - double_press
      - triple_press
      - long_press

button:
  - platform: factory_reset
    id: factory_reset_button
    name: "Factory Reset"
    entity_category: diagnostic
    internal: true
  - platform: template
    id: apply_wifi_credentials_button
    name: "Apply WiFi Credentials"
    entity_category: config
    on_press:
      - if:
          condition:
            lambda: return !id(wifi_setup_ssid).state.empty();
          then:
            - lambda: |-
                id(wifi_setup_status_value) = std::string("Connecting to ") + id(wifi_setup_ssid).state + "...";
            - component.update: wifi_setup_status
            - wifi.configure:
                ssid: !lambda return id(wifi_setup_ssid).state;
                password: !lambda return id(wifi_setup_password).state;
                save: true
                timeout: 30s
                on_connect:
                  - lambda: |-
                      id(wifi_setup_status_value) = std::string("Connected to ") + id(wifi_setup_ssid).state + ". Reconnect on home Wi-Fi and open the satellite control page from your LAN.";
                  - component.update: wifi_setup_status
                on_error:
                  - lambda: |-
                      id(wifi_setup_status_value) = std::string("Failed to connect to ") + id(wifi_setup_ssid).state + ". Check the password and try again.";
                  - component.update: wifi_setup_status
          else:
            - lambda: id(wifi_setup_status_value) = "Enter a Wi-Fi SSID first.";
            - component.update: wifi_setup_status
  - platform: restart
    id: restart_sat1
    name: "Restart Sat1"
    entity_category: diagnostic

# ============================================================================
# GLOBALS
# ============================================================================

globals:
  - id: global_led_animation_index
    type: int
    restore_value: no
    initial_value: '0'
  - id: tas2780_power_mode
    type: uint8_t
    restore_value: no
    initial_value: '0'
  - id: tas2780_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: init_in_progress
    type: bool
    restore_value: no
    initial_value: 'true'
  - id: improv_ble_in_progress
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: wifi_setup_status_value
    type: std::string
    restore_value: no
    initial_value: '"Connect to Hub Wi-Fi, open http://192.168.4.1:8080/, then enter home Wi-Fi."'
  - id: voice_assistant_phase
    type: int
    restore_value: no
    initial_value: ${voice_assist_not_ready_phase_id}
  - id: ptt_button_hold_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: jack_plugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: jack_unplugged_recently
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: volume_buttons_touched
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: first_active_timer
    type: voice_assistant::Timer
    restore_value: false
  - id: is_timer_active
    type: bool
    restore_value: false
  - id: factory_reset_requested
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: follow_up_armed
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: follow_up_active
    type: bool
    restore_value: no
    initial_value: 'false'
  - id: follow_up_enabled
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: whisper_mode_active
    type: bool
    restore_value: yes
    initial_value: 'false'
  - id: warning
    type: bool
    restore_value: no
    initial_value: 'false'
  # 0=idle, 1=flashing in progress, 2=success, 3=failed
  - id: xmos_flashing_state
    type: int
    restore_value: no
    initial_value: '0'

# ============================================================================
# SCRIPTS
# ============================================================================

script:
  - id: configure_selected_wake_word
    then:
      - micro_wake_word.disable_model: okay_nabu
      - micro_wake_word.disable_model: stop
      - micro_wake_word.enable_model: okay_nabu
      - micro_wake_word.enable_model: stop
      - lambda: |-
          const bool use_okay_nabu = id(wake_word_choice).current_option() == "Okay Nabu";
          const std::string sensitivity = id(wake_word_sensitivity).current_option().str();
          if (sensitivity == "Slightly sensitive") {
            id(okay_nabu).set_probability_cutoff(217);
          } else if (sensitivity == "Moderately sensitive") {
            id(okay_nabu).set_probability_cutoff(176);
          } else {
            id(okay_nabu).set_probability_cutoff(143);
          }
          id(stop).set_probability_cutoff(use_okay_nabu ? 143 : 160);

  - id: follow_up_listen
    mode: single
    then:
      - lambda: id(follow_up_armed) = false;
      - if:
          condition:
            lambda: return id(follow_up_enabled);
          then:
            - delay: 350ms
            - if:
                condition:
                  and:
                    - not:
                        voice_assistant.is_running:
                    - switch.is_off: master_mute_switch
                then:
                  - lambda: id(follow_up_active) = true;
                  - voice_assistant.start:
                      silence_detection: true
                  - repeat:
                      count: !lambda return (int) id(follow_up_listen_window_seconds).state;
                      then:
                        - if:
                            condition:
                              not:
                                voice_assistant.is_running:
                            then:
                              - script.stop: follow_up_listen
                        - delay: 1s
                  - if:
                      condition:
                        and:
                          - voice_assistant.is_running:
                          - lambda: return id(follow_up_active);
                      then:
                        - voice_assistant.stop:

  - id: force_stop_wake_word_capture
    mode: restart
    then:
      - delay: 6s
      - if:
          condition:
            and:
              - lambda: return !id(ptt_button_hold_active);
              - voice_assistant.is_running:
          then:
            - lambda: id(voice_assistant_phase) = ${voice_assist_thinking_phase_id};
            - script.execute: control_leds
            - voice_assistant.stop:

  - id: tas2780_ensure_active
    mode: single
    then:
      - if:
          condition:
            lambda: return !id(tas2780_active);
          then:
            - logger.log:
                format: "Activating TAS2780 with power mode %d"
                args: ['id(tas2780_power_mode)']
            - tas2780.activate:
                mode: !lambda return id(tas2780_power_mode);
            - lambda: id(tas2780_active) = true;

  # Master LED dispatcher --- checks state priority and delegates to sub-scripts
  - id: control_leds
    then:
      - lambda: |
          id(check_if_timers_active).execute();
          if (id(is_timer_active)) {
            id(fetch_first_active_timer).execute();
          }
          if (id(xmos_flashing_state) == 1 || id(xmos_flashing_state) == 2) {
            id(control_leds_xmos_flashing).execute();
          } else if (id(xmos_flashing_state) == 3) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(improv_ble_in_progress)) {
            id(control_leds_improv_ble_state).execute();
          } else if (id(init_in_progress)) {
            id(control_leds_init_state).execute();
          } else if (!id(wifi_id).is_connected()) {
            id(control_leds_no_connection_state).execute();
          } else if (id(ptt_button_hold_active)) {
            id(control_leds_action_button_held).execute();
          } else if (id(jack_plugged_recently)) {
            id(control_leds_jack_plugged_recently).execute();
          } else if (id(jack_unplugged_recently)) {
            id(control_leds_jack_unplugged_recently).execute();
          } else if (id(volume_buttons_touched)) {
            id(control_leds_volume_buttons_touched).execute();
          } else if (id(timer_ringing).state) {
            id(control_leds_timer_ringing).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_waiting_for_command_phase_id}) {
            id(control_leds_voice_assistant_waiting_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_listening_for_command_phase_id}) {
            id(control_leds_voice_assistant_listening_for_command_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_thinking_phase_id}) {
            id(control_leds_voice_assistant_thinking_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_replying_phase_id}) {
            id(control_leds_voice_assistant_replying_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_error_phase_id}) {
            id(control_leds_voice_assistant_error_phase).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_not_ready_phase_id}) {
            id(control_leds_voice_assistant_not_ready_phase).execute();
          } else if (id(is_timer_active)) {
            id(control_leds_timer_ticking).execute();
          } else if (id(master_mute_switch).state || id(warning)) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(dac_proxy).volume() == 0.0f || id(dac_proxy).is_muted()) {
            id(control_leds_muted_or_silent).execute();
          } else if (id(voice_assistant_phase) == ${voice_assist_idle_phase_id}) {
            id(control_leds_voice_assistant_idle_phase).execute();
          }

  - id: control_leds_xmos_flashing
    then:
      - light.turn_on:
          brightness: 80%
          red: 0%
          green: 31%
          blue: 100%
          id: voice_assistant_leds
          effect: "XMOS Flashing"

  - id: control_leds_improv_ble_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 100%
          green: 89%
          blue: 71%
          id: voice_assistant_leds
          effect: "Twinkle"

  - id: control_leds_init_state
    then:
      - if:
          condition:
            wifi.connected:
          then:
            - light.turn_on:
                brightness: 66%
                red: 9.4%
                green: 73.3%
                blue: 94.9%
                id: voice_assistant_leds
                effect: "Twinkle"
          else:
            - light.turn_on:
                brightness: 66%
                red: 100%
                green: 89%
                blue: 71%
                id: voice_assistant_leds
                effect: "none"

  - id: control_leds_no_connection_state
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  - id: control_leds_voice_assistant_idle_phase
    then:
      - light.turn_off: voice_assistant_leds

  - id: control_leds_voice_assistant_waiting_for_command_phase
    then:
      - light.turn_on:
          brightness: 80%
          red: 9.4%
          green: 73.3%
          blue: 94.9%
          id: voice_assistant_leds
          effect: "Waiting for Command"

  - id: control_leds_voice_assistant_listening_for_command_phase
    then:
      - light.turn_on:
          brightness: 80%
          red: 9.4%
          green: 73.3%
          blue: 94.9%
          id: voice_assistant_leds
          effect: "Listening For Command"

  - id: control_leds_voice_assistant_thinking_phase
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Thinking"

  - id: control_leds_voice_assistant_replying_phase
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Replying"

  - id: control_leds_voice_assistant_error_phase
    then:
      - light.turn_on:
          brightness: !lambda return min(max(id(led_ring).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f);
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Error"

  - id: control_leds_muted_or_silent
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Muted or Silent"

  - id: control_leds_voice_assistant_not_ready_phase
    then:
      - light.turn_on:
          brightness: 66%
          red: 1
          green: 0
          blue: 0
          id: voice_assistant_leds
          effect: "Twinkle"

  - id: control_leds_timer_ringing
    then:
      - light.turn_on:
          brightness: !lambda return min(max(id(led_ring).current_values.get_brightness(), 0.2f) + 0.1f, 1.0f);
          id: voice_assistant_leds
          effect: "Timer Ring"

  - id: control_leds_timer_ticking
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Timer Tick"

  - id: control_leds_volume_buttons_touched
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Volume Display"

  - id: control_leds_jack_plugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Jack Plugged"

  - id: control_leds_jack_unplugged_recently
    then:
      - light.turn_on:
          brightness: !lambda return max(id(led_ring).current_values.get_brightness(), 0.2f);
          id: voice_assistant_leds
          effect: "Jack Unplugged"

  - id: control_leds_action_button_held
    then:
      - light.turn_on:
          brightness: 80%
          red: 9.4%
          green: 73.3%
          blue: 94.9%
          id: voice_assistant_leds
          effect: "Action Button Held"

  - id: control_volume
    mode: restart
    parameters:
      increase_volume: bool
    then:
      - delay: 16ms
      # Media player volume control disabled - no media player configured
      - lambda: (void)increase_volume;
      - script.execute: control_leds
      - delay: 1s
      - lambda: id(volume_buttons_touched) = false;
      - script.execute: control_leds

  # Self-looping timer ring --- replays the sound every ~1.5s until timer_ringing turns off
  - id: ring_timer
    mode: restart
    then:
      - script.execute:
          id: play_sound
          priority: true
          sound_file: !lambda return id(timer_finished_sound);
      - delay: 1500ms
      - if:
          condition:
            switch.is_on: timer_ringing
          then:
            - script.execute: ring_timer

  # play_sound --- plays embedded local files through the announcement pipeline
  - id: play_sound
    parameters:
      priority: bool
      sound_file: "audio::AudioFile*"
    then:
      - if:
          condition:
            lambda: return priority;
          then:
            - media_player.stop:
                id: external_media_player
                announcement: true
      - lambda: |-
          float volume = id(speaker_volume).state / 100.0f;
          if (sound_file == id(wake_word_triggered_sound)) {
            volume = id(wake_sound_volume).state / 100.0f;
          }
          id(external_media_player)->make_call().set_volume(volume).perform();
      - if:
          condition:
            lambda: return sound_file == id(wake_word_triggered_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: wake_word_triggered_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(error_cloud_expired_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: error_cloud_expired_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(action_button_press_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: action_button_press_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(action_button_double_press_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: action_button_double_press_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(action_button_triple_press_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: action_button_triple_press_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(action_button_long_press_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: action_button_long_press_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(easter_egg_tick_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: easter_egg_tick_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(easter_egg_tada_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: easter_egg_tada_sound
                announcement: true
                enqueue: false

interval:
  - interval: 30s
    then:
      - if:
          condition:
            - lambda: return id(tas2780_active);
            - for:
                time: 60s
                condition:
                  or:
                    - media_player.is_idle: external_media_player
                    - media_player.is_paused: external_media_player
          then:
            - logger.log: "Deactivating TAS2780 due to 60 seconds of idle"
            - tas2780.deactivate:
            - lambda: id(tas2780_active) = false;
      - if:
          condition:
            lambda: return sound_file == id(factory_reset_initiated_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: factory_reset_initiated_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(factory_reset_cancelled_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: factory_reset_cancelled_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(factory_reset_confirmed_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: factory_reset_confirmed_sound
                announcement: true
                enqueue: false
      - if:
          condition:
            lambda: return sound_file == id(mute_switch_off_sound);
          then:
            - media_player.speaker.play_on_device_media_file:
                id: external_media_player
                media_file: mute_switch_off_sound
